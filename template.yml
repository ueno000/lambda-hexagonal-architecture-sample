AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Simple CRUD API with Lambda and API Gateway

Globals:
  Function:
    Runtime: python3.14
    Timeout: 30
    MemorySize: 256
    Tracing: Active

Resources:
  ProductsApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: dev
      Cors:
        AllowMethods: "'GET,POST,PUT,DELETE,OPTIONS'"
        AllowHeaders: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'"
        AllowOrigin: "'*'"

  DynamoTestFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: app.entrypoints.api.handler.handler
      Runtime: python3.14
      Environment:
        Variables:
          AWS_DEFAULT_REGION: us-east-1
          TABLE_NAME: ProductsTable
          DYNAMODB_ENDPOINT: http://host.docker.internal:8000
          API_BASE_PATH: ""
      Events:
        ListProducts:
          Type: Api
          Properties:
            RestApiId: !Ref ProductsApi
            Path: /products
            Method: GET

        CreateProduct:
          Type: Api
          Properties:
            RestApiId: !Ref ProductsApi
            Path: /products
            Method: POST

        GetProduct:
          Type: Api
          Properties:
            RestApiId: !Ref ProductsApi
            Path: /products/{id}
            Method: GET

        UpdateProduct:
          Type: Api
          Properties:
            RestApiId: !Ref ProductsApi
            Path: /products/{id}
            Method: PUT

        DeleteProduct:
          Type: Api
          Properties:
            RestApiId: !Ref ProductsApi
            Path: /products/{id}
            Method: DELETE

      Policies:
        - AWSLambdaBasicExecutionRole
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:Scan
                - dynamodb:PutItem
                - dynamodb:UpdateItem
                - dynamodb:DeleteItem
                - dynamodb:TransactWriteItems
              Resource: "*"

Outputs:
  ProductsApiUrl:
    Description: API Gateway endpoint URL for dev stage
    Value: !Sub "https://${ProductsApi}.execute-api.${AWS::Region}.${AWS::URLSuffix}/dev"

  DynamoTestFunctionArn:
    Description: DynamoTest Lambda Function ARN
    Value: !GetAtt DynamoTestFunction.Arn
