AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: LINE webhook API with Lambda, API Gateway, DynamoDB, and Secrets Manager

Globals:
  Function:
    Runtime: python3.14
    Timeout: 30
    MemorySize: 256
    Tracing: Active

Parameters:
  LINEChannelSecret:
    Type: String
    NoEcho: true

  LINEChannelAccessToken:
    Type: String
    NoEcho: true

Resources:
  LINEMessageProcessorDB:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: LINEMessageProcessor
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST

  LINEUserDB:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: LINEUser
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST

  LINESecrets:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: line/app
      Description: LINE credentials
      SecretString: !Sub |
        {
          "LINE_CHANNEL_SECRET": "${LINEChannelSecret}",
          "LINE_CHANNEL_ACCESS_TOKEN": "${LINEChannelAccessToken}"
        }

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: LambdaDynamoDBPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:GetItem
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                  - dynamodb:Query
                  - dynamodb:Scan
                Resource:
                          - !GetAtt LINEMessageProcessorDB.Arn
                          - !GetAtt LINEUserDB.Arn
                          - !Sub "${LINEUserDB.Arn}/index/line_id-index"
        - PolicyName: LambdaSecretsManagerPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Ref LINESecrets

  ReceivedMessageFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: app.entrypoints.line.handler.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Architectures:
        - x86_64
      Environment:
        Variables:
          TABLE_NAME_LINE: !Ref LINEMessageProcessorDB
          TABLE_NAME_LINE_USER: !Ref LINEUserDB
          LINE_SECRET_ARN: !Ref LINESecrets
          DYNAMODB_ENDPOINT_URL: ""
          ENV: ""
      Events:
        Webhook:
          Type: Api
          Properties:
            Path: /line/receive-message
            Method: post

Outputs:
  ReceivedMessageFunctionArn:
    Description: ReceivedMessageFunction ARN
    Value: !GetAtt ReceivedMessageFunction.Arn

  ApiUrl:
    Description: API Gateway endpoint URL
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/line/receive-message"

  LINESecretsArn:
    Description: Secrets Manager secret ARN
    Value: !Ref LINESecrets
