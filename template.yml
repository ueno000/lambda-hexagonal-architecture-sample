AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: LINE webhook API with Lambda, API Gateway, DynamoDB, and Secrets Manager

Parameters:
  LINEChannelSecret:
    Type: String
    NoEcho: true

  LINEChannelAccessToken:
    Type: String
    NoEcho: true

  GeminiAPIKey:
    Type: String
    NoEcho: true

Resources:
  InfrastructureStack:
    Type: AWS::Serverless::Application
    Properties:
      Location: infrastructure/infra.yml
      Parameters:
        LINEChannelSecret: !Ref LINEChannelSecret
        LINEChannelAccessToken: !Ref LINEChannelAccessToken
        GeminiAPIKey: !Ref GeminiAPIKey

  ApiStack:
    Type: AWS::Serverless::Application
    Properties:
      Location: api/template.yml
      Parameters:
        LambdaExecutionRoleArn: !GetAtt InfrastructureStack.Outputs.LambdaExecutionRoleArn
        LINEMessageProcessorTableName: !GetAtt InfrastructureStack.Outputs.LINEMessageProcessorTableName
        LINEUserTableName: !GetAtt InfrastructureStack.Outputs.LINEUserTableName
        AIUserProfileTableName: !GetAtt InfrastructureStack.Outputs.AIUserProfileTableName
        LINESecretArn: !GetAtt InfrastructureStack.Outputs.LINESecretArn
        AIChatQueueUrl: !GetAtt InfrastructureStack.Outputs.AIChatQueueUrl
        ReplyQueueUrl: !GetAtt InfrastructureStack.Outputs.ReplyQueueUrl

  AIChatFunctionStack:
    Type: AWS::Serverless::Application
    Properties:
      Location: app/entrypoints/ai_chat/template.yml
      Parameters:
        LambdaExecutionRoleArn: !GetAtt InfrastructureStack.Outputs.LambdaExecutionRoleArn
        LINEMessageProcessorTableName: !GetAtt InfrastructureStack.Outputs.LINEMessageProcessorTableName
        LINEUserTableName: !GetAtt InfrastructureStack.Outputs.LINEUserTableName
        AIUserProfileTableName: !GetAtt InfrastructureStack.Outputs.AIUserProfileTableName
        LINESecretArn: !GetAtt InfrastructureStack.Outputs.LINESecretArn
        AIChatQueueArn: !GetAtt InfrastructureStack.Outputs.AIChatQueueArn
        AIChatQueueUrl: !GetAtt InfrastructureStack.Outputs.AIChatQueueUrl
        ReplyQueueUrl: !GetAtt InfrastructureStack.Outputs.ReplyQueueUrl

  ReplyFunctionStack:
    Type: AWS::Serverless::Application
    Properties:
      Location: app/entrypoints/reply/template.yml
      Parameters:
        LambdaExecutionRoleArn: !GetAtt InfrastructureStack.Outputs.LambdaExecutionRoleArn
        LINEMessageProcessorTableName: !GetAtt InfrastructureStack.Outputs.LINEMessageProcessorTableName
        LINEUserTableName: !GetAtt InfrastructureStack.Outputs.LINEUserTableName
        AIUserProfileTableName: !GetAtt InfrastructureStack.Outputs.AIUserProfileTableName
        LINESecretArn: !GetAtt InfrastructureStack.Outputs.LINESecretArn
        AIChatQueueUrl: !GetAtt InfrastructureStack.Outputs.AIChatQueueUrl
        ReplyQueueArn: !GetAtt InfrastructureStack.Outputs.ReplyQueueArn
        ReplyQueueUrl: !GetAtt InfrastructureStack.Outputs.ReplyQueueUrl

Outputs:
  ReceivedMessageFunctionArn:
    Description: ReceivedMessageFunction ARN
    Value: !GetAtt ApiStack.Outputs.ReceivedMessageFunctionArn

  ReplyMessageFunctionArn:
    Description: ReplyMessageFunction ARN
    Value: !GetAtt ReplyFunctionStack.Outputs.FunctionArn

  AIChatFunctionArn:
    Description: AIChatFunction ARN
    Value: !GetAtt AIChatFunctionStack.Outputs.FunctionArn

  LINEUserFunctionArn:
    Description: LINEUserFunction ARN
    Value: !GetAtt ApiStack.Outputs.LINEUserFunctionArn

  ApiUrl:
    Description: API Gateway endpoint URL
    Value:
      !Sub
        - https://${RestApiId}.execute-api.${AWS::Region}.amazonaws.com/Prod/line/receive-message
        - RestApiId: !GetAtt ApiStack.Outputs.ApiId

  LINESecretsArn:
    Description: Secrets Manager secret ARN
    Value: !GetAtt InfrastructureStack.Outputs.LINESecretArn

  AIChatQueueSQSUrl:
    Description: AIChatQueueSQS URL
    Value: !GetAtt InfrastructureStack.Outputs.AIChatQueueUrl

  ReplyQueueSQSUrl:
    Description: ReplyQueueSQS URL
    Value: !GetAtt InfrastructureStack.Outputs.ReplyQueueUrl
