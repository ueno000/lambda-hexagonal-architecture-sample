name: Deploy AI Chat Stack

on:
  push:
    branches:
      - main
    paths:
      - "template.yml"
      - "app/entrypoints/ai_chat/**"
      - "app/application/ai_chat/**"
      - "app/domain/**"
      - "app/config.py"
      - "app/adapters/**"
      - ".github/workflows/deploy-cloud-formation-ai-chat.yaml"

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: prototype

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::176355978867:role/github-deploy-role
          aws-region: ap-northeast-1

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install assertpy moto pytest

      - name: Run tests
        run: |
          python -m unittest discover -s app -p "test_*.py" -v

      - name: Setup SAM CLI
        run: |
          pip install aws-sam-cli

      - name: Read infrastructure outputs
        shell: bash
        run: |
          STACK_NAME="lambda-hexagonal-architecture-sample-infra"

          get_output() {
            aws cloudformation describe-stacks \
              --stack-name "$STACK_NAME" \
              --region ap-northeast-1 \
              --query "Stacks[0].Outputs[?OutputKey=='$1'].OutputValue" \
              --output text
          }

          echo "LAMBDA_EXECUTION_ROLE_ARN=$(get_output LambdaExecutionRoleArn)" >> "$GITHUB_ENV"
          echo "LINE_MESSAGE_PROCESSOR_TABLE_NAME=$(get_output LINEMessageProcessorTableName)" >> "$GITHUB_ENV"
          echo "LINE_USER_TABLE_NAME=$(get_output LINEUserTableName)" >> "$GITHUB_ENV"
          echo "AI_USER_PROFILE_TABLE_NAME=$(get_output AIUserProfileTableName)" >> "$GITHUB_ENV"
          echo "LINE_SECRET_ARN=$(get_output LINESecretArn)" >> "$GITHUB_ENV"
          echo "AI_CHAT_QUEUE_ARN=$(get_output AIChatQueueArn)" >> "$GITHUB_ENV"
          echo "AI_CHAT_QUEUE_URL=$(get_output AIChatQueueUrl)" >> "$GITHUB_ENV"
          echo "REPLY_QUEUE_URL=$(get_output ReplyQueueUrl)" >> "$GITHUB_ENV"

      - name: Build AI chat template
        run: |
          sam build --template-file app/entrypoints/ai_chat/template.yml --use-container

      - name: Deploy AI chat stack
        run: |
          sam deploy \
            --template-file .aws-sam/build/template.yaml \
            --stack-name lambda-hexagonal-architecture-sample-ai-chat \
            --capabilities CAPABILITY_IAM CAPABILITY_NAMED_IAM \
            --parameter-overrides \
              LambdaExecutionRoleArn=$LAMBDA_EXECUTION_ROLE_ARN \
              LINEMessageProcessorTableName=$LINE_MESSAGE_PROCESSOR_TABLE_NAME \
              LINEUserTableName=$LINE_USER_TABLE_NAME \
              AIUserProfileTableName=$AI_USER_PROFILE_TABLE_NAME \
              LINESecretArn=$LINE_SECRET_ARN \
              AIChatQueueArn=$AI_CHAT_QUEUE_ARN \
              AIChatQueueUrl=$AI_CHAT_QUEUE_URL \
              ReplyQueueUrl=$REPLY_QUEUE_URL \
            --resolve-s3 \
            --region ap-northeast-1 \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset
